name: Render Quarto

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    env:
      WT_USERNAME: ${{ secrets.WT_USERNAME }}
      WT_PASSWORD: ${{ secrets.WT_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install packages
        run: Rscript -e 'install.packages("wildrtrax")'

      - name: Render
        run: quarto render
